name: Daily Report

# 觸發條件設定
on:
  schedule:
    # 這裡設定時間為每天 UTC 16:00 (等同台灣時間隔日的凌晨 0:00)
    - cron: '0 16 * * *'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      # 步驟 1：發送每日執行次數回報到 LINE
      - name: Send Daily Summary
        run: |
          # 這裡計算一天的排程次數 (若每 30 分鐘一次，一天即約 48 次)
          ATTEMPTS=48 
          MSG="📅 每日回報：今日嘗試次數約 $ATTEMPTS 次，目前狀態：資源仍不足，持續監控中。"
          
          # 將訊息透過 HTTP POST 請求傳給 LINE Messaging API
          curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.LINE_ACCESS_TOKEN }}" \
          -d "{\"to\": \"${{ secrets.LINE_USER_ID }}\", \"messages\": [{\"type\": \"text\", \"text\": \"$MSG\"}]}"