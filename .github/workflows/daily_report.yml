name: Daily Report

# 觸發條件設定
on:
  schedule:
    # 這裡設定時間為每天 UTC 16:00 (等同台灣時間隔日的凌晨 0:00)
    - cron: '0 16 * * *'

# 共用相同的 concurrency group，避免和 register 同時執行
concurrency:
  group: register-arm
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      # 步驟 1：發送每日回報至所有已設定的通知平台
      - name: Send Daily Summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 統計過去 24 小時內 register.yml 的失敗次數
          FAIL_COUNT=$(gh run list --workflow register.yml --status failure --limit 100 --json createdAt | jq '[.[] | select(.createdAt > (now - 86400 | strftime("%Y-%m-%dT%H:%M:%SZ")))] | length')
          
          DATE=$(date '+%Y-%m-%d %H:%M UTC')
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          
          MSG="📅 每日監控回報 ($DATE)\n\n目前狀態：資源仍不足，持續嘗試中。\n❌ 今日失敗嘗試：$FAIL_COUNT 次\n\n👤 執行帳號：$ACTOR\n📂 來源：$REPO\n🔗 Run ID: ${{ github.run_id }}"

          # LINE 通知
          if [ -n "${{ secrets.LINE_ACCESS_TOKEN }}" ] && [ -n "${{ secrets.LINE_USER_ID }}" ]; then
            curl -s -X POST https://api.line.me/v2/bot/message/push \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.LINE_ACCESS_TOKEN }}" \
              -d "{\"to\": \"${{ secrets.LINE_USER_ID }}\", \"messages\": [{\"type\": \"text\", \"text\": \"$MSG\"}]}"
          fi

          # Telegram 通知
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$MSG"
          fi

          # Discord 通知
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"$MSG\"}"
          fi