name: ARM Auto Registration

# 觸發條件設定
on:
  schedule:
    # 這裡的 cron 設定每 30 分鐘執行一次 (注意：Github Actions 由於資源排隊，可能會有延遲)
    - cron: '*/30 * * * *'
  # 允許使用者在 GitHub Actions 頁面手動觸發流程
  workflow_dispatch:

# 控制併發：確保同一時間只有一個申請任務執行
concurrency:
  group: register-arm
  cancel-in-progress: false

jobs:
  register:
    runs-on: ubuntu-latest
    # 提供 GitHub 關閉 workflow 所需的權限
    permissions:
      actions: write
      contents: write
    steps:
      # 步驟 1：檢出原始碼
      - uses: actions/checkout@v4
      
      # 步驟 2：設定 Python 執行環境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 步驟 3：安裝所需的 Python 套件 (OCI SDK 和 requests)
      - name: Install dependencies
        run: pip install oci requests

      # 步驟 4：執行申請的主要腳本，並載入所有需要的環境變數
      - name: Run Script
        env:
          # --- Secrets：帳號/金鑰等機密資訊 ---
          OCI_CONFIG_USER: ${{ secrets.OCI_CONFIG_USER }}
          OCI_CONFIG_KEY_CONTENT: ${{ secrets.OCI_CONFIG_KEY_CONTENT }}
          OCI_CONFIG_FINGERPRINT: ${{ secrets.OCI_CONFIG_FINGERPRINT }}
          OCI_CONFIG_TENANCY: ${{ secrets.OCI_CONFIG_TENANCY }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # --- Variables：非機密設定值 ---
          OCI_CONFIG_REGION: ${{ vars.OCI_CONFIG_REGION }}
          OCI_IMAGE_ID: ${{ vars.OCI_IMAGE_ID }}
          OCI_SUBNET_ID: ${{ vars.OCI_SUBNET_ID }}
          OCI_OCPUS: ${{ vars.OCI_OCPUS }}
          OCI_MEMORY_GBS: ${{ vars.OCI_MEMORY_GBS }}
          OCI_BOOT_VOLUME_SIZE: ${{ vars.OCI_BOOT_VOLUME_SIZE }}
          OCI_BOOT_VOLUME_VPUS_PER_GB: ${{ vars.OCI_BOOT_VOLUME_VPUS_PER_GB }}
          OCI_MAX_INSTANCES: ${{ vars.OCI_MAX_INSTANCES }}
          OCI_SHAPE: ${{ vars.OCI_SHAPE }}
        run: python main.py

      # 步驟 5：記錄每次執行的狀態
      - name: Log status for summary
        run: |
          mkdir -p logs
          date +%Y-%m-%d >> logs/attempts.log

      # 步驟 6：寫入 GitHub Actions Job Summary 儀表板
      - name: Generate Job Summary
        run: |
          echo "## 🚀 OCI ARM Deployment Status" >> $GITHUB_STEP_SUMMARY
          if [ -f result.txt ]; then
            RESULT=$(cat result.txt)
            if [ "$RESULT" = "success" ]; then
              echo "### 🟢 Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
            else
              echo "### 🔴 Status: FAIL / CAPACITY / BUDGET" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### 📝 Execution Log" >> $GITHUB_STEP_SUMMARY
            echo "| Region | Availability Domain | Result |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            if [ -f detailed_log.txt ]; then
              cat detailed_log.txt >> $GITHUB_STEP_SUMMARY
            else
              echo "| N/A | N/A | No detailed logs available |" >> $GITHUB_STEP_SUMMARY
            fi
          else
             echo "### ⚠️ Status: UNKNOWN" >> $GITHUB_STEP_SUMMARY
          fi

      # 步驟 7：如果註冊成功，自動停止未來的排程
      - name: Auto-stop workflow on success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f result.txt ]; then
            RESULT=$(cat result.txt)
            if [ "$RESULT" = "success" ]; then
              echo "✅ Instance created successfully! Disabling this workflow."
              gh workflow disable "ARM Auto Registration"
            fi
          fi

      # 步驟 8：提交 dashboard 統計資料 (stats.json) 回收納庫
      - name: Commit Dashboard Stats
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull
          git add stats.json || true
          git commit -m "📊 update dashboard stats [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed, maybe parallel run conflict"