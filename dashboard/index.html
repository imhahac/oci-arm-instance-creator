<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCI ARM Instance Creator 儀表板</title>
    <!-- 使用 Tailwind CSS 加速開發精美介面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <header class="mb-8 flex justify-between items-center border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-blue-500">
                    OCI ARM Automator
                </h1>
                <p class="text-gray-400 mt-1">即時狀態監控儀表板</p>
            </div>
            <div class="text-right flex flex-col items-end">
                <p class="text-sm text-gray-400">最後更新</p>
                <div class="flex items-center space-x-2">
                    <span id="refreshing" class="hidden">
                        <svg class="animate-spin h-4 w-4 text-green-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <p id="lastRun" class="text-lg font-mono text-green-300">Loading...</p>
                </div>
            </div>
        </header>

        <main class="space-y-6">
            <!-- 狀態卡片區塊 -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg class="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zM8 11.586L5.707 9.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l7-7a1 1 0 00-1.414-1.414L8 11.586z"></path></svg>
                    </div>
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">總執行次數</h3>
                    <p id="totalRuns" class="text-4xl font-bold text-white mt-2">0</p>
                </div>

                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">成功取得實例</h3>
                    <p id="successRuns" class="text-4xl font-bold text-green-400 mt-2">0</p>
                </div>

                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">失敗/被拒次數</h3>
                    <p id="failRuns" class="text-4xl font-bold text-red-400 mt-2">0</p>
                </div>
                
                <div class="bg-gray-800 p-5 rounded-xl border border-blue-600/50 shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg class="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg>
                    </div>
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">目前現存實例</h3>
                    <p id="activeInstances" class="text-4xl font-bold text-blue-400 mt-2">0</p>
                </div>

                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">整體成功率</h3>
                    <p id="successRate" class="text-4xl font-bold text-green-400 mt-2">0%</p>
                </div>
            </div>

            <!-- 圖表區塊 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                    <h2 class="text-lg font-semibold mb-4 text-white">區域容量不足分佈 (Regions)</h2>
                    <canvas id="regionPieChart"></canvas>
                </div>
                
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                    <h2 class="text-lg font-semibold mb-4 text-white">熱點時段分析 (UTC 小時)</h2>
                    <canvas id="hourlyBarChart"></canvas>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h2 class="text-lg font-semibold mb-4 text-white">近期 50 次自動申請紀錄</h2>
                <canvas id="historyLineChart" height="100"></canvas>
            </div>

        </main>
        
        <footer class="mt-12 text-center text-sm text-gray-500 pb-8">
            <p>Generated by GitHub Actions • <a href="https://github.com/imhahac/oci-arm-instance-creator" class="text-blue-400 hover:underline">oci-arm-instance-creator</a></p>
        </footer>
    </div>

    <script>
        async function fetchStats() {
            const refreshing = document.getElementById('refreshing');
            refreshing.classList.remove('hidden');
            
            // 嘗試多種可能的路徑
            const paths = ['../stats.json', './stats.json', 'stats.json'];
            let stats = null;
            let error = null;

            for (const path of paths) {
                try {
                    const res = await fetch(`${path}?t=${new Date().getTime()}`);
                    if (res.ok) {
                        stats = await res.json();
                        break;
                    }
                } catch (e) {
                    error = e;
                }
            }

            if (stats) {
                renderDashboard(stats);
            } else {
                console.error("All fetch paths failed", error);
                document.getElementById('lastRun').innerText = "連線失敗或資料尚未產生";
                document.getElementById('lastRun').classList.add("text-red-500");
                document.getElementById('lastRun').classList.remove("text-green-300");
            }
            
            setTimeout(() => refreshing.classList.add('hidden'), 500);
        }

        let charts = {}; // 追蹤圖表實例以便銷毀重繪

        function renderDashboard(data) {
            // 解析資料
            document.getElementById('lastRun').innerText = data.last_run ? new Date(data.last_run).toLocaleString() : "N/A";
            document.getElementById('lastRun').classList.remove("text-red-500");
            document.getElementById('lastRun').classList.add("text-green-300");
            
            document.getElementById('totalRuns').innerText = data.total_runs || 0;
            document.getElementById('successRuns').innerText = data.success_runs || 0;
            document.getElementById('failRuns').innerText = data.fail_runs || 0;
            document.getElementById('activeInstances').innerText = data.active_instances || 0;
            
            const rate = data.total_runs > 0 ? ((data.success_runs / data.total_runs) * 100).toFixed(1) : 0;
            document.getElementById('successRate').innerText = `${rate}%`;

            // 銷毀舊圖表
            Object.values(charts).forEach(c => c.destroy());

            // 1. 圓餅圖 - 區域失敗狀況
            const regions = Object.keys(data.regions_failed || {});
            const regionValues = Object.values(data.regions_failed || {});
            charts.pie = new Chart(document.getElementById('regionPieChart'), {
                type: 'doughnut',
                data: {
                    labels: regions.length ? regions : ['暫無數據'],
                    datasets: [{
                        data: regions.length ? regionValues : [1],
                        backgroundColor: ['#ef4444', '#f97316', '#eab308', '#3b82f6', '#8b5cf6', '#6b7280'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af' } } }
                }
            });

            // 2. 圓餅圖/長條圖 - 小時分佈 (新維度)
            const hourLabels = Array.from({length: 24}, (_, i) => `${i}h`);
            const hourData = data.hourly_distribution || {};
            charts.bar = new Chart(document.getElementById('hourlyBarChart'), {
                type: 'bar',
                data: {
                    labels: hourLabels,
                    datasets: [
                        {
                            label: '成功',
                            data: Array.from({length: 24}, (_, i) => hourData[i]?.success || 0),
                            backgroundColor: '#4ade80'
                        },
                        {
                            label: '失敗',
                            data: Array.from({length: 24}, (_, i) => hourData[i]?.fail || 0),
                            backgroundColor: '#f87171'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { stacked: true, ticks: { color: '#9ca3af' } },
                        y: { stacked: true, ticks: { color: '#9ca3af' }, grid: { color: '#374151' } }
                    },
                    plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af' } } }
                }
            });

            // 3. 折線圖 - 近期趨勢
            const history = data.history || [];
            charts.line = new Chart(document.getElementById('historyLineChart'), {
                type: 'line',
                data: {
                    labels: history.map((_, idx) => `#${idx+1}`),
                    datasets: [{
                        label: 'AD 嘗試次數',
                        data: history.map(h => h.attempts),
                        borderColor: '#60a5fa',
                        backgroundColor: 'rgba(96, 165, 250, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { display: false },
                        y: { ticks: { color: '#9ca3af', stepSize: 1 }, grid: { color: '#374151' } }
                    },
                    plugins: { legend: { labels: { color: '#9ca3af' } } }
                }
            });
        }

        window.onload = () => {
            fetchStats();
            setInterval(fetchStats, 60000); // 每一分鐘自動刷新
        };
    </script>
</body>
</html>
