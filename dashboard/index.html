<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCI ARM Instance Creator 儀表板</title>
    <!-- 使用 Tailwind CSS 加速開發精美介面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <header class="mb-8 flex justify-between items-center border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-blue-500">
                    OCI ARM Automator
                </h1>
                <p class="text-gray-400 mt-1">即時狀態監控儀表板</p>
            </div>
            <div class="text-right flex flex-col items-end">
                <p class="text-sm text-gray-400">最後更新</p>
                <div class="flex items-center space-x-2">
                    <span id="refreshing" class="hidden">
                        <svg class="animate-spin h-4 w-4 text-green-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <p id="lastRun" class="text-lg font-mono text-green-300">Loading...</p>
                </div>
            </div>
        </header>

        <main class="space-y-6" id="dashboardMain">
            <!-- 錯誤提示區塊 (預設隱藏) -->
            <div id="errorBanner" class="hidden bg-red-900/50 border border-red-500 rounded-xl p-6 text-center">
                <svg class="w-12 h-12 text-red-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <h2 id="errorTitle" class="text-xl font-bold text-red-300 mb-2">載入失敗</h2>
                <p id="errorMsg" class="text-gray-300">無法取得統計資料，請稍後再試。</p>
            </div>

            <!-- 狀態卡片區塊 -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg class="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zM8 11.586L5.707 9.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l7-7a1 1 0 00-1.414-1.414L8 11.586z"></path></svg>
                    </div>
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">總執行次數</h3>
                    <p id="totalRuns" class="text-4xl font-bold text-white mt-2">0</p>
                </div>

                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">成功取得實例</h3>
                    <p id="successRuns" class="text-4xl font-bold text-green-400 mt-2">0</p>
                </div>

                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">失敗/被拒次數</h3>
                    <p id="failRuns" class="text-4xl font-bold text-red-400 mt-2">0</p>
                </div>
                
                <div class="bg-gray-800 p-5 rounded-xl border border-blue-600/50 shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg class="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg>
                    </div>
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">目前現存實例</h3>
                    <p id="activeInstances" class="text-4xl font-bold text-blue-400 mt-2">0</p>
                </div>

                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">整體成功率</h3>
                    <p id="successRate" class="text-4xl font-bold text-green-400 mt-2">0%</p>
                </div>
            </div>

            <!-- 圖表區塊 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg" style="min-height: 300px;">
                    <h2 class="text-lg font-semibold mb-4 text-white">區域容量不足分佈 (Regions)</h2>
                    <div class="relative h-64 w-full">
                        <canvas id="regionPieChart"></canvas>
                    </div>
                </div>
                
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg" style="min-height: 300px;">
                    <h2 class="text-lg font-semibold mb-4 text-white">熱點時段分析 (UTC 小時)</h2>
                    <div class="relative h-64 w-full">
                        <canvas id="hourlyBarChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg" style="min-height: 300px;">
                <h2 class="text-lg font-semibold mb-4 text-white">近期 50 次自動申請紀錄</h2>
                <div class="relative h-64 w-full">
                    <canvas id="historyLineChart"></canvas>
                </div>
            </div>

        </main>
        
        <footer class="mt-12 text-center text-sm text-gray-500 pb-8">
            <p>Generated by GitHub Actions • <a href="https://github.com/imhahac/oci-arm-instance-creator" class="text-blue-400 hover:underline">oci-arm-instance-creator</a></p>
        </footer>
    </div>

    <script>
        class DashboardController {
            constructor() {
                this.charts = {};
                this.refreshing = document.getElementById('refreshing');
                this.lastRunDisplay = document.getElementById('lastRun');
                this.fetchTimeout = 8000; // 8秒超時機制
                
                this.init();
            }

            init() {
                this.fetchStats();
                setInterval(() => this.fetchStats(), 60000); // 每一分鐘自動刷新
            }

            async fetchStats() {
                this.refreshing.classList.remove('hidden');
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), this.fetchTimeout);
                
                const paths = ['../stats.json', './stats.json', 'stats.json'];
                let stats = null;
                let error = null;

                for (const path of paths) {
                    try {
                        const res = await fetch(`${path}?t=${Date.now()}`, { signal: controller.signal });
                        if (res.ok) {
                            stats = await res.json();
                            break;
                        }
                    } catch (e) {
                        error = e;
                    }
                }
                clearTimeout(timeoutId);

                if (stats) {
                    this.renderDashboard(stats);
                } else {
                    this.handleError(error);
                }
                
                setTimeout(() => this.refreshing.classList.add('hidden'), 500);
            }

            handleError(error) {
                console.error("Dashboard fetch failed:", error);
                const isTimeout = error && error.name === 'AbortError';
                const msg = isTimeout ? "請求超時 (Timeout)" : "連線失敗或資料尚未產生";
                
                this.lastRunDisplay.innerText = msg;
                this.lastRunDisplay.classList.add("text-red-500");
                this.lastRunDisplay.classList.remove("text-green-300");

                // 在畫面上顯示明確的錯誤卡片
                document.getElementById('errorBanner').classList.remove('hidden');
                document.getElementById('errorMsg').innerText = msg + "。詳情請查看瀏覽器 Console。";
            }

            renderDashboard(data) {
                // 隱藏錯誤橫幅
                document.getElementById('errorBanner').classList.add('hidden');
                
                // 1. 基底資料填充
                this.lastRunDisplay.innerText = data.last_run ? new Date(data.last_run).toLocaleString() : "N/A";
                this.lastRunDisplay.classList.remove("text-red-500");
                this.lastRunDisplay.classList.add("text-green-300");
                
                document.getElementById('totalRuns').innerText = data.total_runs || 0;
                document.getElementById('successRuns').innerText = data.success_runs || 0;
                document.getElementById('failRuns').innerText = data.fail_runs || 0;
                document.getElementById('activeInstances').innerText = data.active_instances || 0;
                
                const rate = data.total_runs > 0 ? ((data.success_runs / data.total_runs) * 100).toFixed(1) : 0;
                document.getElementById('successRate').innerText = `${rate}%`;

                // 2. 銷毀舊圖表
                Object.values(this.charts).forEach(c => c.destroy());

                // 3. 重新繪製圖表
                this._renderPieChart(data.regions_failed || {});
                this._renderBarChart(data.hourly_distribution || {});
                this._renderLineChart(data.history || []);
            }

            _renderPieChart(regionsData) {
                const regions = Object.keys(regionsData);
                const values = Object.values(regionsData);
                this.charts.pie = new Chart(document.getElementById('regionPieChart'), {
                    type: 'doughnut',
                    data: {
                        labels: regions.length ? regions : ['暫無數據'],
                        datasets: [{
                            data: regions.length ? values : [1],
                            backgroundColor: ['#ef4444', '#f97316', '#eab308', '#3b82f6', '#8b5cf6', '#6b7280'],
                            borderWidth: 0
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af' } } } }
                });
            }

            _renderBarChart(hourData) {
                const hourLabels = Array.from({length: 24}, (_, i) => `${i}h`);
                this.charts.bar = new Chart(document.getElementById('hourlyBarChart'), {
                    type: 'bar',
                    data: {
                        labels: hourLabels,
                        datasets: [
                            {
                                label: '成功',
                                data: Array.from({length: 24}, (_, i) => hourData[i]?.success || 0),
                                backgroundColor: '#4ade80'
                            },
                            {
                                label: '失敗',
                                data: Array.from({length: 24}, (_, i) => hourData[i]?.fail || 0),
                                backgroundColor: '#f87171'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { x: { stacked: true, ticks: { color: '#9ca3af' } }, y: { stacked: true, ticks: { color: '#9ca3af' }, grid: { color: '#374151' } } },
                        plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af' } } }
                    }
                });
            }

            _renderLineChart(history) {
                this.charts.line = new Chart(document.getElementById('historyLineChart'), {
                    type: 'line',
                    data: {
                        labels: history.map((_, idx) => `#${idx+1}`),
                        datasets: [{
                            label: 'AD 嘗試次數',
                            data: history.map(h => h.attempts),
                            borderColor: '#60a5fa',
                            backgroundColor: 'rgba(96, 165, 250, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { x: { display: false }, y: { ticks: { color: '#9ca3af', stepSize: 1 }, grid: { color: '#374151' } } },
                        plugins: { legend: { labels: { color: '#9ca3af' } } }
                    }
                });
            }
        }

        window.onload = () => new DashboardController();
    </script>
</body>
</html>
